name: Docker

on:
  push:
    branches:
      - master
  pull_request:
    
jobs:
  docker-build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write      # Required for GHCR
      id-token: write      # Required for Google Artifact Registry (GAR)
    steps:
      - name: Set up QEMU
        uses: docker/setup-qemu-action@ce360397dd3f832beb865e1373c09c0e9f86d70a # v4.0.0
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@4d04d5d9486b7bd6fa91e7baf45bbb4f8b9deedd # v4.0.0
      - name: Login to GHCR
        if: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
        uses: docker/login-action@b45d80f862d83dbcd57f89517bcf500b2ab88fb2 # v4.0.0
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Generate Docker metadata
        id: meta
        uses: docker/metadata-action@030e881283bb7a6894de51c315a6bfe6a94e05cf # v6.0.0
        with:
          labels: |
            org.opencontainers.image.title=Faux Seer
            org.opencontainers.image.description=Faux Seer is a self-hosted, Go-based compatibility layer for Sentry's Seer service. It implements the signed HTTP endpoints Sentry expects for autofix, summaries, similarity, severity, and project preferences, while delegating text generation and embeddings to configurable providers or safe local stubs.
            org.opencontainers.image.authors=Reinaldy Rafli
            org.opencontainers.image.url=https://github.com/aldy505/faux-seer
          images: ghcr.io/${{ github.repository }}
          tags: |
            type=sha
            type=edge
      - uses: docker/build-push-action@d08e5c354a6adb9ed34480a06d141179aa583294 # v7.0.0
        with:
          context: .
          file: ./Dockerfile
          push: ${{ github.event_name == 'push' && github.ref == 'refs/heads/master' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: true
          sbom: true
          platforms: linux/amd64,linux/arm64